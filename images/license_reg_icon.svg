<svg width="100%" viewBox="0 0 200 208" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-l" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%" stop-color="#1A3A6A"/>
      <stop offset="100%" stop-color="#080E2A"/>
    </linearGradient>
    <linearGradient id="cert-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFBE8"/>
      <stop offset="100%" stop-color="#E8DEB8"/>
    </linearGradient>
    <linearGradient id="ribbon-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E84040"/>
      <stop offset="100%" stop-color="#9A1010"/>
    </linearGradient>
    <linearGradient id="medal-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="100%" stop-color="#B88010"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="98" fill="url(#bg-l)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#D4AA40" stroke-width="4" style="fill:none;stroke:rgb(212, 170, 64);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="100" cy="100" r="91" fill="none" stroke="#D4AA40" stroke-width="1" opacity="0.3" style="fill:none;stroke:rgb(212, 170, 64);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Certificate document -->
  <rect x="34" y="36" width="110" height="110" rx="6" fill="url(#cert-l)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Certificate border decoration -->
  <rect x="40" y="42" width="98" height="98" rx="4" fill="none" stroke="#D4AA40" stroke-width="1.5" style="fill:none;stroke:rgb(212, 170, 64);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="44" y="46" width="90" height="90" rx="3" fill="none" stroke="#D4AA40" stroke-width="0.5" opacity="0.5" style="fill:none;stroke:rgb(212, 170, 64);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

