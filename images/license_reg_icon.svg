  <path d="M54,126 Q60,122 66,126 Q72,130 78,126" fill="none" stroke="#3A2A8A" stroke-width="1.5" stroke-linecap="round" style="fill:none;stroke:rgb(58, 42, 138);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

